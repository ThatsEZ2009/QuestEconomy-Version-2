# Messages use MiniMessage formatting: https://docs.advntr.dev/minimessage/format.html
prefix: "<gold>[Quests]</gold> <gray>"
no-permission: "<red>You don't have permission to do that."
players-only: "<red>Only players can use that."
coins-given: "<green>Gave <yellow><amount>x <coin></yellow> to <white><player></white>."
coins-received: "<green>You received <yellow><amount>x <coin></yellow>."
usage-givecoins: "<gray>Usage: /qadmin givecoins <player> <copper|silver|gold|diamond> <amount>"
unknown-coin: "<red>Unknown coin type. Use copper, silver, gold or diamond."
player-not-found: "<red>Player not found."
reloaded: "<green>QuestEconomy config reloaded."
coin-blocked-storage: "<red>Coins can't be stored there — you have to carry them."

# Quests (Pass 2)
not-enough-coins: "<red>You don't have enough coins for that."
nothing-to-turn-in: "<red>You have none of the required items to turn in."
look-at-block: "<red>Look at a block within 6 blocks to set it as a Quest Board."
board-set: "<green>Quest Board set! Right-click it to open the quest menu."
board-removed: "<green>Quest Board removed."
board-exists: "<yellow>That block is already a Quest Board."
not-a-board: "<red>That block isn't a Quest Board."

# Coin Mint (Pass 3)
mint-set: "<green>Coin Mint set! Right-click it to convert coins."
mint-removed: "<green>Coin Mint removed."
mint-exists: "<yellow>That block is already a Coin Mint."
not-a-mint: "<red>That block isn't a Coin Mint."
mint-nothing: "<red>You don't have the coins for that conversion."

# Teleport costs & buy homes (Pass 3)
tp-need-coins: "<red>You need <#e0913a><cost> Copper Coins</#e0913a> to teleport there."
tp-paid: "<green>Teleported. <#e0913a>(-<cost> Copper Coins)"
tp-cancelled: "<gray>Teleport cancelled."
tp-nothing: "<gray>Nothing to confirm."
buyhome-bought: "<green>Home slot purchased! You now have <white><total></white> homes. <#e0913a>(-<cost> Copper Coins)"
buyhome-cant-afford: "<red>You need <#e0913a><cost> Copper Coins</#e0913a> to buy the next home slot."
